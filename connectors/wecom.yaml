# ============================================================
# 企业微信 Connector 配置
# ============================================================

id: wecom
name: 企业微信
version: "1.0.0"
description: 企业微信，支持应用消息、群机器人消息收发
enabled: true

# 入站配置（Webhook 接收消息）
inbound:
  enabled: true
  webhook_path: /api/connector/webhooks/wecom
  handler: wecom

# 认证配置
auth:
  type: custom
  config:
    token_url: "https://qyapi.weixin.qq.com/cgi-bin/gettoken"
    token_method: GET
    token_params:
      corpid: "${WECOM_CORP_ID}"
      corpsecret: "${WECOM_CORP_SECRET}"
    token_field: "access_token"
    expires_in_field: "expires_in"

# 凭证（通过环境变量注入）
credentials:
  corp_id: "${WECOM_CORP_ID}"
  corp_secret: "${WECOM_CORP_SECRET}"
  agent_id: "${WECOM_AGENT_ID}"
  token: "${WECOM_TOKEN}"
  encoding_aes_key: "${WECOM_ENCODING_AES_KEY}"

# 工具定义
tools:
  - name: send_message
    description: 向企业微信用户或群发送消息
    input_schema:
      type: object
      properties:
        reply_context:
          type: object
          description: 从入站事件中透传的回复上下文
        text:
          type: string
          description: 要发送的文本内容
        msgtype:
          type: string
          enum: ["text", "markdown"]
          default: "text"
      required: [reply_context, text]
    retryable: true
    timeout_ms: 5000
    executor: http
    executor_config:
      method: POST
      url: "https://qyapi.weixin.qq.com/cgi-bin/message/send?access_token=${token}"
      body:
        touser: "${input.reply_context.channel_id}"
        msgtype: "${input.msgtype}"
        agentid: "${WECOM_AGENT_ID}"
        text:
          content: "${input.text}"

  - name: get_user_info
    description: 根据 userid 查询企业微信用户信息
    input_schema:
      type: object
      properties:
        userid:
          type: string
          description: 企业微信用户 ID
      required: [userid]
    retryable: true
    timeout_ms: 5000
    executor: http
    executor_config:
      method: GET
      url: "https://qyapi.weixin.qq.com/cgi-bin/user/get?access_token=${token}&userid=${input.userid}"