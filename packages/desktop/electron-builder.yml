appId: com.thething.desktop
productName: The Thing

directories:
  output: dist

files:
  - build/**/*
  - loading/**/*

extraResources:
  - from: resources/standalone
    to: standalone
    filter:
      - "**/*"

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.developer-tools
  icon: icons/icon.icns

win:
  target:
    - target: nsis
      arch: [x64]
  icon: icons/icon.ico

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Development
  icon: icons

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
