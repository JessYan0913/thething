<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Thing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:
      radial-gradient(circle at 30% 24%, rgba(13, 27, 43, 0.08), transparent 32%),
      radial-gradient(circle at 70% 68%, rgba(13, 27, 43, 0.06), transparent 34%),
      linear-gradient(145deg, #f8fafc 0%, #edf2f7 52%, #e2e8f0 100%);
    color: #111827;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
  }
  .logo {
    width: 80px;
    height: 80px;
  }
  .logo svg {
    width: 100%;
    height: 100%;
  }
  .bar {
    width: 132px;
    height: 3px;
    border-radius: 999px;
    background: rgba(13, 27, 43, 0.12);
    overflow: hidden;
  }
  .bar::before {
    content: "";
    display: block;
    width: 42%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #0d1b2b, #1a3a5c);
    animation: load 1.1s ease-in-out infinite;
  }
  @keyframes load {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(240%); }
  }
  p {
    font-size: 13px;
    color: #64748b;
    letter-spacing: 0;
  }
</style>
</head>
