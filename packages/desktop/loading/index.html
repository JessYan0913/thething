<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Thing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:
      radial-gradient(circle at 30% 24%, rgba(212, 134, 43, 0.15), transparent 32%),
      radial-gradient(circle at 70% 68%, rgba(184, 93, 62, 0.12), transparent 34%),
      linear-gradient(145deg, #f8fafc 0%, #edf2f7 52%, #e2e8f0 100%);
    color: #111827;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
  }
  .mark {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background:
      linear-gradient(155deg, #1c1814 0%, #161310 54%, #0e0c0a 100%);
    box-shadow: 0 26px 70px rgba(15, 23, 42, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.18);
    display: grid;
    place-items: center;
    position: relative;
  }
  .mark::before {
    content: "";
    width: 42px;
    height: 42px;
    border: 5px solid #f8fafc;
    border-right-color: #D4862B;
    border-bottom-color: #B85D3E;
    border-radius: 16px;
    transform: rotate(45deg);
  }
  .mark::after {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 999px;
    background: #f8fafc;
    box-shadow: 0 0 24px rgba(212, 134, 43, 0.55);
  }
  .bar {
    width: 132px;
    height: 3px;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.12);
    overflow: hidden;
  }
  .bar::before {
    content: "";
    display: block;
    width: 42%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #D4862B, #B85D3E);
    animation: load 1.1s ease-in-out infinite;
  }
  @keyframes load {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(240%); }
  }
  p {
    font-size: 13px;
    color: #64748b;
    letter-spacing: 0;
  }
</style>
</head>
<body>
<div class="container">
  <div class="mark" aria-hidden="true"></div>
  <div class="bar" aria-hidden="true"></div>
  <p>Starting...</p>
</div>
</body>
</html>
